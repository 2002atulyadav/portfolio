<svg width="100%" viewBox="0 0 1000 560" role="img" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<title>Task Orchestration Engine — parallel agentic workflow with priority queue, Kafka streaming and artifact publishing</title>
<desc>Tickets enter from JIRA through a prioritized P1/P2/P3 queue into a central orchestrator that schedules agents in parallel on an Azure cluster. Agents stream status, reports and artifact events over Kafka; generated artifacts are pushed to GitLab/GitHub and an Artifactory (S3/Nexus), while LangChain monitors and results return to the user dashboard.</desc>

<style>
  .bg { fill:#211e1a; }
  .nfill { fill:rgba(255,255,255,0.045); stroke:rgba(255,255,255,0.12); stroke-width:1; }
  .t  { font-family:ui-sans-serif,system-ui,sans-serif; fill:#e9e2d5; font-size:13.5px; font-weight:500; }
  .ts { font-family:ui-sans-serif,system-ui,sans-serif; fill:#9a9286; font-size:11px; font-weight:400; }
  .eyebrow { font-family:ui-sans-serif,system-ui,sans-serif; fill:#be4a2b; font-size:11px; font-weight:600; letter-spacing:0.22em; }
  .zlabel { font-family:ui-sans-serif,system-ui,sans-serif; font-size:10px; font-weight:600; letter-spacing:0.13em; }
  .conn { fill:none; stroke:rgba(255,255,255,0.14); stroke-width:1; }
  .conn-rust { fill:none; stroke:rgba(190,74,43,0.5); stroke-width:1.2; stroke-dasharray:5 6; }
  .conn-green{ fill:none; stroke:rgba(63,143,91,0.55); stroke-width:1.2; stroke-dasharray:5 6; }
  .conn-kfk  { fill:none; stroke:rgba(83,170,170,0.5); stroke-width:1.2; stroke-dasharray:4 5; }
  .dash-flow { animation: dashmove 1s linear infinite; }
  @keyframes dashmove { to { stroke-dashoffset:-22; } }
  .ring { fill:none; stroke:#be4a2b; }
  .pulse { animation: pulsering 3s ease-out infinite; }
  @keyframes pulsering { 0%{ r:30; opacity:0.55;} 70%{ opacity:0;} 100%{ r:66; opacity:0;} }
  .spin { animation: spin 9s linear infinite; transform-origin:428px 188px; }
  @keyframes spin { to { transform:rotate(360deg);} }
  .agentcard { animation: glow 4s ease-in-out infinite; }
  @keyframes glow { 0%,100%{ stroke:rgba(255,255,255,0.12);} 50%{ stroke:rgba(190,74,43,0.6);} }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect class="bg" x="0" y="0" width="1000" height="560" rx="16"/>
<rect x="1" y="1" width="998" height="558" rx="15" fill="none" stroke="rgba(255,255,255,0.06)"/>
<text class="eyebrow" x="28" y="32">TASK ORCHESTRATION ENGINE</text>

<!-- ================= CONNECTORS ================= -->
