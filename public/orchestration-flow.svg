<path class="conn" d="M93 176 V 162" marker-end="url(#arrow)"/>
<path class="conn" d="M93 234 V 220" marker-end="url(#arrow)"/>
<path class="conn-rust dash-flow" d="M158 256 C 168 256, 168 210, 178 210" marker-end="url(#arrow)"/>
<!-- queue lanes -> orchestrator -->
<path class="conn-rust dash-flow" d="M324 130 C 336 130, 332 178, 344 184" marker-end="url(#arrow)"/>
<path class="conn-rust dash-flow" d="M324 200 H 344" marker-end="url(#arrow)"/>
<path class="conn-rust dash-flow" d="M324 270 C 336 270, 332 222, 344 196" marker-end="url(#arrow)"/>
<!-- orchestrator -> agents -->
<path id="fa1" class="conn-rust dash-flow" d="M512 180 C 530 180, 538 123, 556 123" marker-end="url(#arrow)"/>
<path id="fa2" class="conn-rust dash-flow" d="M512 195 C 532 195, 538 205, 556 205" marker-end="url(#arrow)"/>
<path id="fa3" class="conn-rust dash-flow" d="M512 215 C 530 215, 538 288, 556 288" marker-end="url(#arrow)"/>
<path id="fa4" class="conn-rust dash-flow" d="M512 230 C 528 230, 538 342, 556 342" marker-end="url(#arrow)"/>
<!-- ci/cd -> artifacts -->
<path id="ar1" class="conn-green dash-flow" d="M824 282 C 844 282, 846 195, 858 195" marker-end="url(#arrow)"/>
<path id="ar2" class="conn-green dash-flow" d="M824 294 C 844 294, 846 271, 858 271" marker-end="url(#arrow)"/>
<!-- agents -> kafka (producers) -->
<path id="k1" class="conn-kfk dash-flow" d="M620 364 V 468" marker-end="url(#arrow)"/>
<path id="k2" class="conn-kfk dash-flow" d="M700 364 V 468" marker-end="url(#arrow)"/>
<path id="k3" class="conn-kfk dash-flow" d="M780 366 V 468" marker-end="url(#arrow)"/>
<!-- kafka -> dashboard / langchain (consumers) -->
<path id="kc1" class="conn-green dash-flow" d="M178 492 H 160" marker-end="url(#arrow)"/>
<path id="kc2" class="conn-kfk dash-flow" d="M858 492 H 840" marker-start="url(#arrow)"/>
<!-- dashboard -> web ui (results to user) -->
<path id="ret" class="conn-green dash-flow" d="M93 468 C 93 360, 120 300, 110 162" marker-end="url(#arrow)"/>

