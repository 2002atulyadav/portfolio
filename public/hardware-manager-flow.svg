<svg width="100%" viewBox="0 0 1000 660" role="img" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<title>Hardware Manager Platform — centralized FastAPI control plane with multi-region HIL agent fleet, telemetry, OTA and test campaigns</title>
<desc>A FastAPI control plane with device registry, health monitor, OTA service and test campaign engine dispatches commands to HIL agents on desktop machines across EU, US, APAC and ASIA regions. Devices stream telemetry back; results are persisted to PostgreSQL and published to Artifactory (S3/Nexus), all surfaced on a central dashboard.</desc>

<style>
  .bg { fill:#211e1a; }
  .nfill { fill:rgba(255,255,255,0.045); stroke:rgba(255,255,255,0.12); stroke-width:1; }
  .t  { font-family:ui-sans-serif,system-ui,sans-serif; fill:#e9e2d5; font-size:13px; font-weight:500; }
  .ts { font-family:ui-sans-serif,system-ui,sans-serif; fill:#9a9286; font-size:11px; font-weight:400; }
  .eyebrow { font-family:ui-sans-serif,system-ui,sans-serif; fill:#be4a2b; font-size:11px; font-weight:600; letter-spacing:0.22em; }
  .zlabel { font-family:ui-sans-serif,system-ui,sans-serif; font-size:10px; font-weight:600; letter-spacing:0.13em; }
  .conn-rust  { fill:none; stroke:rgba(190,74,43,0.52); stroke-width:1.2; stroke-dasharray:5 6; }
  .conn-teal  { fill:none; stroke:rgba(83,170,170,0.52); stroke-width:1.2; stroke-dasharray:4 5; }
  .conn-green { fill:none; stroke:rgba(63,143,91,0.58); stroke-width:1.2; stroke-dasharray:5 6; }
  .conn       { fill:none; stroke:rgba(255,255,255,0.14); stroke-width:1; }
  .dash-flow  { animation:dashmove 1s linear infinite; }
  @keyframes dashmove { to { stroke-dashoffset:-22; } }
  .ring { fill:none; stroke:#be4a2b; }
  .pulse { animation:pulsering 3s ease-out infinite; }
  @keyframes pulsering { 0%{r:24;opacity:0.55;} 70%{opacity:0;} 100%{r:54;opacity:0;} }
  .blink  { animation:blink 1.8s ease-in-out infinite; }
  .blink2 { animation:blink 2.6s ease-in-out infinite; animation-delay:0.5s; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.22;} }
  .modcard { animation:glow 4s ease-in-out infinite; }
  @keyframes glow { 0%,100%{stroke:rgba(255,255,255,0.12);} 50%{stroke:rgba(190,74,43,0.6);} }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; } }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect class="bg" x="0" y="0" width="1000" height="660" rx="16"/>
<rect x="1" y="1" width="998" height="658" rx="15" fill="none" stroke="rgba(255,255,255,0.06)"/>

<text class="eyebrow" x="28" y="30">HARDWARE MANAGER PLATFORM</text>

<!-- legend -->
<circle cx="490" cy="26" r="4" fill="#e0633f"/>
<text class="ts" x="500" y="30">control · OTA</text>
<circle cx="610" cy="26" r="4" fill="#7fd4d4"/>
<text class="ts" x="620" y="30">telemetry</text>
<circle cx="712" cy="26" r="4" fill="#5bbd83"/>
<text class="ts" x="722" y="30">results · reports</text>

<!-- ============================================================
     LEFT COLUMN: gateway + persistence
============================================================ -->
<rect class="nfill" x="28" y="52" width="148" height="54" rx="9"/>
<text class="t"  x="44" y="76">Dashboard</text>
<text class="ts" x="44" y="93">Fleet · health · reports</text>

<rect class="nfill" x="28" y="128" width="148" height="44" rx="9"/>
<text class="t"  x="44" y="155">API Gateway</text>

<rect class="nfill" x="28" y="468" width="148" height="52" rx="9"/>
<text class="t"  x="44" y="491">PostgreSQL</text>
<text class="ts" x="44" y="508">Registry · telemetry</text>

<rect class="nfill" x="28" y="540" width="148" height="52" rx="9"/>
<text class="t"  x="44" y="563">Artifactory</text>
<text class="ts" x="44" y="580">S3 · Nexus · reports</text>

<!-- gateway -> hero -->
<path class="conn-rust dash-flow" d="M176 152 C 196 152, 200 200, 218 200" marker-end="url(#arrow)"/>
<!-- hero -> dashboard -->
<path id="d_dash" class="conn-green dash-flow" d="M218 152 C 198 152, 196 96, 176 96" marker-end="url(#arrow)"/>
<!-- hero -> db -->
<path id="d_db"  class="conn-teal dash-flow"  d="M218 390 C 196 390, 196 494, 176 494" marker-end="url(#arrow)"/>
<!-- hero -> artifactory -->
<path id="d_art" class="conn-green dash-flow" d="M218 410 C 190 410, 192 566, 176 566" marker-end="url(#arrow)"/>

<!-- ============================================================
     HERO: HARDWARE MANAGER (FastAPI control plane)
============================================================ -->
<rect x="218" y="90" width="228" height="360" rx="16" fill="rgba(190,74,43,0.12)" stroke="#be4a2b" stroke-width="1.5"/>

<text class="t"  x="332" y="116" text-anchor="middle" style="font-size:14.5px;">Hardware Manager</text>
<text class="ts" x="332" y="133" text-anchor="middle" style="fill:#be4a2b;">Python · FastAPI · control plane</text>

<!-- pulsing core -->
<circle class="ring pulse" cx="332" cy="174" r="24" style="animation-delay:0s"/>
<circle class="ring pulse" cx="332" cy="174" r="24" style="animation-delay:1.5s"/>
<circle cx="332" cy="174" r="18" fill="#be4a2b"/>
<circle cx="332" cy="174" r="18" fill="none" stroke="rgba(255,255,255,0.3)"/>
<text class="t" x="332" y="178" text-anchor="middle" style="fill:#fff;font-size:11px;">API</text>

<!-- modules -->
<rect class="nfill modcard" x="232" y="210" width="200" height="40" rx="8" style="animation-delay:0s"/>
<text class="t"  x="248" y="228" style="font-size:12.5px;">Device Registry</text>
<text class="ts" x="248" y="243">1,000+ devices · regions</text>

<rect class="nfill modcard" x="232" y="258" width="200" height="40" rx="8" style="animation-delay:0.8s"/>
<text class="t"  x="248" y="276" style="font-size:12.5px;">Health Monitor</text>
<text class="ts" x="248" y="291">Live telemetry · alerts</text>

<rect class="nfill modcard" x="232" y="306" width="200" height="40" rx="8" style="animation-delay:1.6s"/>
<text class="t"  x="248" y="324" style="font-size:12.5px;">OTA Service</text>
<text class="ts" x="248" y="339">Canary → staged rollout</text>

<rect class="nfill modcard" x="232" y="354" width="200" height="40" rx="8" style="animation-delay:2.4s"/>
<text class="t"  x="248" y="372" style="font-size:12.5px;">Test Campaigns</text>
<text class="ts" x="248" y="387">Parallel HIL runs · reports</text>

<rect class="nfill modcard" x="232" y="402" width="200" height="36" rx="8" style="animation-delay:3.2s"/>
<text class="t"  x="248" y="418" style="font-size:12.5px;">Secure Access</text>
<text class="ts" x="248" y="433">Guacamole · 85% less latency</text>

<!-- ============================================================
     REGION CONNECTOR PATHS (all 4 regions)
============================================================ -->
<!-- EU -->
<path id="o_eu" class="conn-rust  dash-flow" d="M446 210 C 470 210, 472 158, 488 158" marker-end="url(#arrow)"/>
<path id="i_eu" class="conn-teal  dash-flow" d="M488 178 C 472 178, 470 240, 446 240" marker-end="url(#arrow)"/>
<!-- US -->
<path id="o_us" class="conn-rust  dash-flow" d="M446 290 C 472 290, 472 308, 488 308" marker-end="url(#arrow)"/>
<path id="i_us" class="conn-teal  dash-flow" d="M488 328 C 472 328, 472 340, 446 340" marker-end="url(#arrow)"/>
<!-- APAC -->
<path id="o_ap" class="conn-rust  dash-flow" d="M446 370 C 472 370, 472 454, 488 454" marker-end="url(#arrow)"/>
<path id="i_ap" class="conn-green dash-flow" d="M488 474 C 472 474, 472 410, 446 410" marker-end="url(#arrow)"/>
<!-- ASIA -->
<path id="o_as" class="conn-rust  dash-flow" d="M446 420 C 470 420, 470 574, 488 574" marker-end="url(#arrow)"/>
<path id="i_as" class="conn-green dash-flow" d="M488 594 C 470 594, 470 436, 446 436" marker-end="url(#arrow)"/>

<!-- ============================================================
     REGION CARDS
============================================================ -->

<!-- EU -->
<rect x="488" y="100" width="486" height="102" rx="12" fill="none" stroke="rgba(255,255,255,0.18)" stroke-dasharray="6 6"/>
<text class="zlabel" x="504" y="120" style="fill:#7fb0c9;">REGION · EU</text>
<rect class="nfill" x="504" y="128" width="148" height="60" rx="8"/>
<text class="t"  x="518" y="150">HIL Agent</text>
<text class="ts" x="518" y="167">Desktop runner</text>
<rect class="nfill" x="678" y="128" width="178" height="60" rx="8"/>
<text class="t"  x="692" y="152">Hardware · ECUs</text>
<text class="ts" x="692" y="169">12 devices · sensors</text>
<circle cx="848" cy="148" r="4" fill="#5bbd83"/>
<circle cx="848" cy="163" r="4" fill="#5bbd83" class="blink"/>
<circle cx="848" cy="178" r="4" fill="#d8a23b" class="blink2"/>
<path class="conn-teal dash-flow" d="M678 158 H 652" marker-start="url(#arrow)"/>

<!-- US -->
<rect x="488" y="250" width="486" height="102" rx="12" fill="none" stroke="rgba(255,255,255,0.18)" stroke-dasharray="6 6"/>
<text class="zlabel" x="504" y="270" style="fill:#7fb0c9;">REGION · US</text>
<rect class="nfill" x="504" y="278" width="148" height="60" rx="8"/>
<text class="t"  x="518" y="300">HIL Agent</text>
<text class="ts" x="518" y="317">Desktop runner</text>
