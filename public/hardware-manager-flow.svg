<!-- ============================================================
     ANIMATED FLOW DOTS
============================================================ -->
<g>
  <!-- control/OTA outbound (rust) -->
  <circle r="3" fill="#e0633f"><animateMotion dur="1.7s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#o_eu"/></animateMotion></circle>
  <circle r="3" fill="#e0633f"><animateMotion dur="1.7s" repeatCount="indefinite" begin="0.3s"><mpath xlink:href="#o_us"/></animateMotion></circle>
  <circle r="3" fill="#e0633f"><animateMotion dur="1.7s" repeatCount="indefinite" begin="0.6s"><mpath xlink:href="#o_ap"/></animateMotion></circle>
  <circle r="3" fill="#e0633f"><animateMotion dur="1.7s" repeatCount="indefinite" begin="0.9s"><mpath xlink:href="#o_as"/></animateMotion></circle>
  <!-- telemetry inbound (teal) -->
  <circle r="3" fill="#7fd4d4"><animateMotion dur="1.7s" repeatCount="indefinite" begin="0.5s"><mpath xlink:href="#i_eu"/></animateMotion></circle>
  <circle r="3" fill="#7fd4d4"><animateMotion dur="1.7s" repeatCount="indefinite" begin="0.8s"><mpath xlink:href="#i_us"/></animateMotion></circle>
  <!-- results inbound (green) -->
  <circle r="3" fill="#5bbd83"><animateMotion dur="1.7s" repeatCount="indefinite" begin="1.1s"><mpath xlink:href="#i_ap"/></animateMotion></circle>
  <circle r="3" fill="#5bbd83"><animateMotion dur="1.7s" repeatCount="indefinite" begin="1.4s"><mpath xlink:href="#i_as"/></animateMotion></circle>
  <!-- persistence + dashboard -->
  <circle r="3" fill="#7fd4d4"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath xlink:href="#d_db"/></animateMotion></circle>
  <circle r="3" fill="#5bbd83"><animateMotion dur="2s"   repeatCount="indefinite"><mpath xlink:href="#d_art"/></animateMotion></circle>
  <circle r="3" fill="#5bbd83"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath xlink:href="#d_dash"/></animateMotion></circle>
</g>
</svg>
