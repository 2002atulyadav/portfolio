<text class="t"  x="692" y="302">Hardware · ECUs</text>
<text class="ts" x="692" y="319">28 devices · sensors</text>
<circle cx="848" cy="297" r="4" fill="#5bbd83"/>
<circle cx="848" cy="312" r="4" fill="#5bbd83" class="blink"/>
<circle cx="848" cy="327" r="4" fill="#5bbd83" class="blink2"/>
<path class="conn-teal dash-flow" d="M678 308 H 652" marker-start="url(#arrow)"/>

<!-- APAC -->
<rect x="488" y="400" width="486" height="102" rx="12" fill="none" stroke="rgba(255,255,255,0.18)" stroke-dasharray="6 6"/>
<text class="zlabel" x="504" y="420" style="fill:#7fb0c9;">REGION · APAC</text>
<rect class="nfill" x="504" y="428" width="148" height="60" rx="8"/>
<text class="t"  x="518" y="450">HIL Agent</text>
<text class="ts" x="518" y="467">Desktop runner</text>
<rect class="nfill" x="678" y="428" width="178" height="60" rx="8"/>
<text class="t"  x="692" y="452">Hardware · ECUs</text>
<text class="ts" x="692" y="469">15 devices · sensors</text>
<circle cx="848" cy="447" r="4" fill="#5bbd83"/>
<circle cx="848" cy="462" r="4" fill="#d8a23b" class="blink"/>
<circle cx="848" cy="477" r="4" fill="#5bbd83" class="blink2"/>
<path class="conn-green dash-flow" d="M678 458 H 652" marker-start="url(#arrow)"/>

<!-- ASIA -->
<rect x="488" y="520" width="486" height="102" rx="12" fill="none" stroke="rgba(255,255,255,0.18)" stroke-dasharray="6 6"/>
<text class="zlabel" x="504" y="540" style="fill:#7fb0c9;">REGION · ASIA</text>
<rect class="nfill" x="504" y="548" width="148" height="60" rx="8"/>
<text class="t"  x="518" y="570">HIL Agent</text>
<text class="ts" x="518" y="587">Desktop runner</text>
