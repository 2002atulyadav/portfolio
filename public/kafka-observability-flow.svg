<svg width="100%" viewBox="0 0 1000 580" role="img" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<title>Kafka Pipeline and Observability — partition-based throttling, DLQ, Redis cache, Prometheus, Grafana, Splunk</title>
<desc>Microservice producers publish events to a partitioned Kafka cluster with per-partition throttling. Consumer groups process in parallel; failed messages route to a DLQ. Redis caches hot lookups. Prometheus scrapes broker and consumer metrics into Grafana dashboards; Splunk aggregates logs; alerts fire on DLQ spikes and lag thresholds.</desc>

<style>
  .bg  { fill:#211e1a; }
  .nf  { fill:rgba(255,255,255,0.045); stroke:rgba(255,255,255,0.12); stroke-width:1; }
  .t   { font-family:ui-sans-serif,system-ui,sans-serif; fill:#e9e2d5; font-size:13px; font-weight:500; }
  .ts  { font-family:ui-sans-serif,system-ui,sans-serif; fill:#9a9286; font-size:11px; font-weight:400; }
  .eyebrow { font-family:ui-sans-serif,system-ui,sans-serif; fill:#be4a2b; font-size:11px; font-weight:600; letter-spacing:0.22em; }
  .zl  { font-family:ui-sans-serif,system-ui,sans-serif; font-size:10px; font-weight:600; letter-spacing:0.13em; }
  .cr  { fill:none; stroke:rgba(190,74,43,0.52); stroke-width:1.2; stroke-dasharray:5 6; }
  .ct  { fill:none; stroke:rgba(83,170,170,0.52); stroke-width:1.2; stroke-dasharray:4 5; }
  .cg  { fill:none; stroke:rgba(63,143,91,0.58); stroke-width:1.2; stroke-dasharray:5 6; }
  .ca  { fill:none; stroke:rgba(216,162,59,0.58); stroke-width:1.2; stroke-dasharray:4 5; }
  .cp  { fill:none; stroke:rgba(160,120,210,0.55); stroke-width:1.2; stroke-dasharray:4 5; }
  .df  { animation:dm 1s linear infinite; }
  @keyframes dm { to { stroke-dashoffset:-22; } }
  .pl  { animation:plr 3s ease-out infinite; fill:none; stroke:#be4a2b; }
  @keyframes plr { 0%{r:14;opacity:0.6;} 70%{opacity:0;} 100%{r:32;opacity:0;} }
  .gc  { animation:glw 3.5s ease-in-out infinite; }
  @keyframes glw { 0%,100%{stroke:rgba(255,255,255,0.12);} 50%{stroke:rgba(190,74,43,0.5);} }
  .sk  { animation:sk 0.9s ease-in-out infinite alternate; }
  @keyframes sk { from{height:8px;y:20px;} to{height:28px;y:0px;} }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; } }
</style>

